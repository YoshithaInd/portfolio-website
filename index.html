<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">Yositha Indeewari</div>

  <button id="menu-toggle">☰</button>

  <nav>
    <a href="#home" class="nav-link active">Home</a>
    <a href="#about" class="nav-link">About</a>
    <a href="#skills" class="nav-link">Skills</a>
    <a href="#projects" class="nav-link">Projects</a>
    <a href="#contact" class="nav-link">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <h1>Hi, I'm Yositha Indeewari</h1>
  <p>Software Engineering Student | Aspiring Developer</p>

  <div class="buttons">
    <button class="btn primary" id="publicationsBtn">View Publications</button>
    <button class="btn outline" id="contactBtn">Contact Me</button>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About Me</h2>
  <p>I am passionate about software development and building modern web applications.</p>
</section>

<!-- SKILLS -->
<section id="skills">
  <h2>Skills</h2>
  <p>HTML, CSS, JavaScript, C Programming</p>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>
  <div id="project-container"></div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Me</h2>

  <form id="contact-form">
    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="message" placeholder="Your Message"></textarea>
    <button type="submit">Send</button>
  </form>

  <p id="form-message"></p>
</section>

<script src="script.js"></script>
</body>
</html>
